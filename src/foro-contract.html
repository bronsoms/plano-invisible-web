<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foro Contract</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            padding: 20px;
        }

        .image-container {
            max-width: 100%;
            text-align: center;
        }

        .team-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .team-image {
                width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="team.jpeg" alt="Team" class="team-image">
    </div>
</body>
</html>
